name: Deploy to Staging

on:
  # Deploy only after the real test workflow ("Tests and Quality Checks" in
  # tests.yml) succeeds on main. The old name "Test Suite" matched no workflow,
  # so this trigger never fired and the removed `push` trigger deployed every
  # push regardless of test results. See #163.
  workflow_run:
    workflows: ["Tests and Quality Checks"]
    types: [completed]
    branches: [main]
  # Allow on-demand deploys (e.g. server bring-up, re-deploy without a code push).
  workflow_dispatch:

# Two rapid pushes to main (e.g. a PR merge followed by a docs commit) trigger
# two test runs and therefore two deploys ~1 minute apart. The overlapping SSH
# bursts against the shared staging box are what made the second run's upload
# time out (see the 2026-07-12 failures). Serialize: one deploy at a time, the
# newest queued run supersedes older queued ones. Never cancel a deploy that is
# already mid-flight.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'

# Required GitHub Secrets:
# SSH & Server:
#   - SSH_KEY: Private SSH key for server access
#   - HOST: Server hostname/IP
#   - USER: SSH username
#
# URLs:
#   - API_URL: Backend API URL (e.g., https://api.dev.autoauthor.app/api/v1)
#   - FRONTEND_URL: Frontend URL (e.g., https://dev.autoauthor.app)
#
# Database:
#   - MONGODB_URI: MongoDB connection string
#   - DATABASE_NAME: Database name (e.g., auto_author_staging)
#
# OpenAI:
#   - OPENAI_API_KEY: OpenAI API key
#
# Better Auth Authentication:
#   - BETTER_AUTH_SECRET: Shared secret for JWT signing/verification (min 64 chars)
#     Generate with: python -c 'import secrets; print(secrets.token_urlsafe(64))'
#
# Optional (AWS):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_REGION
#   - AWS_S3_BUCKET
#
# Optional (Cloudinary):
#   - CLOUDINARY_CLOUD_NAME
#   - CLOUDINARY_API_KEY
#   - CLOUDINARY_API_SECRET

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest
    # Deploy on a manual dispatch, or when the upstream test workflow passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: staging
      url: https://dev.autoauthor.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Deploy the exact commit that passed "Tests and Quality Checks",
          # not whatever HEAD happens to be when this workflow_run fires.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL: ${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_ENVIRONMENT: staging
          # Error tracking (#334) — inlined at build; empty secret = Sentry off.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          # Create temporary directory
          mkdir -p /tmp/deploy

          # Copy necessary files (exclude development artifacts)
          rsync -av --progress \
            --exclude='node_modules' \
            --exclude='.venv' \
            --exclude='.next' \
            --exclude='coverage' \
            --exclude='*.log' \
            --exclude='.env.local' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='test-results' \
            --exclude='playwright-report' \
            --exclude='.git' \
            . /tmp/deploy/

          # Create tar archive
          cd /tmp/deploy
          tar -czf /tmp/deploy-package.tar.gz .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          # NOTE: no `nc` preflight or `ssh-keyscan` here. Those open connections
          # that close *before authenticating*, which the staging host's
          # fail2ban (aggressive mode, maxretry=4) counts as attacks — the
          # nc + 3x keyscan burst hit the threshold and banned the runner every
          # run (see #162). The scp/ssh steps below authenticate on the first
          # connection via StrictHostKeyChecking=accept-new, so the runner only
          # ever makes successful ("Accepted publickey") connections. An
          # unreachable host now surfaces as a clear scp/ssh failure below.

      - name: Upload package to server
        run: |
          # This is the run's FIRST SSH contact: with accept-new and an empty
          # known_hosts the client's host-key discovery opens several
          # short-lived preauth connections before the real one, and on the
          # shared staging box that burst intermittently gets the follow-up
          # connection dropped (observed as "port 22: Connection timed out",
          # 2026-07-12). Retry with a cool-down; ConnectTimeout keeps a dead
          # attempt from eating the default ~2min TCP timeout. Retries reuse
          # the now-populated known_hosts, so they connect singly.
          for attempt in 1 2 3; do
            if scp -i ~/.ssh/staging_key \
                 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
                 /tmp/deploy-package.tar.gz \
                 ${{ secrets.USER }}@${{ secrets.HOST }}:/tmp/; then
              exit 0
            fi
            echo "Upload attempt $attempt failed; retrying in 60s..."
            sleep 60
          done
          echo "Upload failed after 3 attempts"
          exit 1

      - name: Validate security configuration
        run: |
          # SECURITY CHECK: Ensure BYPASS_AUTH is never enabled in deployment secrets
          # BYPASS_AUTH must NEVER be enabled in staging or production environments
          # as it would allow unauthorized access to all user data.
          BYPASS_AUTH_VALUE="${BYPASS_AUTH:-false}"
          BYPASS_AUTH_NORMALIZED=$(echo "$BYPASS_AUTH_VALUE" | tr '[:upper:]' '[:lower:]')

          if [[ "$BYPASS_AUTH_NORMALIZED" == "true" ]]; then
            echo "FATAL SECURITY ERROR: BYPASS_AUTH is set to 'true' in deployment environment"
            echo "This setting must NEVER be enabled in staging or production."
            exit 1
          fi
          echo "✓ Security check passed: BYPASS_AUTH is not enabled (value: ${BYPASS_AUTH_VALUE})"
        env:
          BYPASS_AUTH: ${{ secrets.BYPASS_AUTH }}

      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            ${{ secrets.USER }}@${{ secrets.HOST }} \
            'bash -s' << 'ENDSSH'
          set -euo pipefail

          ENVIRONMENT="staging"
          RELEASE_ID="$(date +%Y%m%d-%H%M%S)"
          API_URL="${{ secrets.API_URL }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"

          DEPLOY_BASE="/opt/auto-author"
          RELEASE_DIR="$DEPLOY_BASE/releases/$RELEASE_ID"
          CURRENT_DIR="$DEPLOY_BASE/current"

          echo "==> Deploying $ENVIRONMENT environment (Release: $RELEASE_ID)"

          # Create release directory
          mkdir -p "$RELEASE_DIR"

          # Extract uploaded package
          echo "==> Extracting deployment package..."
          tar -xzf /tmp/deploy-package.tar.gz -C "$RELEASE_DIR"

          # Setup backend environment
          echo "==> Setting up backend..."
          cd "$RELEASE_DIR/backend"

          # Install Python dependencies using uv
          # Check if uv is already installed, if not download it
          if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
          else
            echo "uv already installed, skipping download"
          fi
          export PATH="$HOME/.local/bin:$PATH"
          uv venv
          source .venv/bin/activate
          uv sync

          # Create backend .env file with all required variables
          echo "==> Creating backend .env file..."
          {
            echo "# Database"
            echo "DATABASE_URL=${{ secrets.MONGODB_URI }}"
            echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}"
            echo ""
            echo "# CORS Settings — plain comma-separated origins (the app's
            # config validator splits on ',' for non-JSON values). A quoted
            # JSON array here gets its quotes mangled by the dotenv reader into
            # invalid JSON, crashing Settings() on startup. Only the frontend
            # origin makes cross-origin calls to the API; an API URL with a
            # /api/v1 path is not a valid Origin, so it is not listed."
            echo "BACKEND_CORS_ORIGINS=$FRONTEND_URL"
            echo ""
            echo "# OpenAI"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_AUTOAUTHOR_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo ""
            echo "# Error tracking (#334) — empty secret => Sentry off"
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN_BACKEND }}"
            echo ""
            echo "# Better Auth Authentication"
            echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            echo "BETTER_AUTH_URL=$FRONTEND_URL"
            echo "BETTER_AUTH_ISSUER=better-auth"
            echo ""
            echo "# API Settings"
            echo "API_V1_PREFIX=/api/v1"
            echo ""
            echo "# E2E test account exempt from per-user rate limit / AI quota /"
            echo "# entitlement (the staging E2E suite runs as one real user with"
            echo "# real auth and legitimately exceeds human limits). Fenced to"
            echo "# non-production in code; harmless if the secret is empty."
            echo "E2E_EXEMPT_EMAILS=${{ secrets.TEST_USER_EMAIL }}"
            echo ""
            echo "# AWS Settings (Optional)"
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            echo "AWS_REGION=${{ secrets.AWS_REGION }}"
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}"
            echo ""
            echo "# Cloudinary Settings (Optional)"
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
          } > .env

          # Verify .env file was created
          if [ ! -f .env ]; then
            echo "ERROR: Failed to create backend .env file"
            exit 1
          fi
          echo "✓ Backend .env file created"

          # Setup frontend environment
          echo "==> Setting up frontend..."
          cd "$RELEASE_DIR/frontend"

          # Create/update .env.production with all required variables
          {
            echo "NODE_ENV=production"
            echo "NEXT_PUBLIC_API_URL=$API_URL"
            echo "NEXT_PUBLIC_BETTER_AUTH_URL=$FRONTEND_URL"
            echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
            echo "DATABASE_URL=${{ secrets.MONGODB_URI }}"
            echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}"
            echo "NEXT_PUBLIC_ENVIRONMENT=$ENVIRONMENT"
            echo "PORT=3002"
            # Transactional email for password reset (#332). Without these the
            # reset flow silently no-ops in production. next start loads
            # .env.production at runtime, so these reach the server-side sender.
            echo "EMAIL_SERVICE_PROVIDER=${{ secrets.EMAIL_SERVICE_PROVIDER }}"
            echo "EMAIL_SERVICE_API_KEY=${{ secrets.EMAIL_SERVICE_API_KEY }}"
            echo "EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}"
            # Error tracking (#334) — inlined at build below; empty = off.
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN_FRONTEND }}"
          } > .env.production

          # Export environment variables for build process
          export NODE_ENV=production
          export NEXT_PUBLIC_API_URL=$API_URL
          export NEXT_PUBLIC_BETTER_AUTH_URL=$FRONTEND_URL
          export BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          export DATABASE_URL=${{ secrets.MONGODB_URI }}
          export DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          export NEXT_PUBLIC_ENVIRONMENT=$ENVIRONMENT
          # NEXT_PUBLIC_SENTRY_DSN must be present for the server-side build to
          # inline it into the client bundle (#334); empty secret = Sentry off.
          export NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN_FRONTEND }}

          # Install dependencies and build
          # Remove old .next cache to prevent stale builds
          echo "==> Cleaning old build cache..."
          rm -rf .next

          echo "==> Installing frontend dependencies..."
          # --include=dev: NODE_ENV=production (exported above) makes `npm ci`
          # skip devDependencies, but the build needs them — notably typescript,
          # which `next build` requires to load next.config.ts. Without this the
          # build fails with "Cannot find module 'typescript'".
          npm ci --include=dev

          echo "==> Building frontend..."
          npm run build

          # Update symlink atomically BEFORE generating ecosystem config
          echo "==> Switching to new release..."
          ln -snf "$RELEASE_DIR" "$CURRENT_DIR.tmp"
          mv -Tf "$CURRENT_DIR.tmp" "$CURRENT_DIR"

          # Generate PM2 ecosystem config using symlink paths (not release-specific paths)
          echo "==> Generating PM2 ecosystem configuration..."
          cd "$CURRENT_DIR"
          sed -e "s|__BACKEND_CWD__|$CURRENT_DIR/backend|g" \
              -e "s|__FRONTEND_CWD__|$CURRENT_DIR/frontend|g" \
              -e "s|__ENVIRONMENT__|$ENVIRONMENT|g" \
              -e "s|__API_URL__|$API_URL|g" \
              -e "s|__DATABASE_URL__|${{ secrets.MONGODB_URI }}|g" \
              -e "s|__DATABASE_NAME__|${{ secrets.DATABASE_NAME }}|g" \
              -e "s|__BETTER_AUTH_SECRET__|${{ secrets.BETTER_AUTH_SECRET }}|g" \
              -e "s|__BETTER_AUTH_URL__|$FRONTEND_URL|g" \
              ecosystem.config.template.js > ecosystem.config.js

          # Reload PM2 services using ecosystem file
          echo "==> Reloading PM2 services with ecosystem config..."

          # Use delete + start instead of reload to force fresh start with new config
          pm2 delete auto-author-backend auto-author-frontend || true
          pm2 start ecosystem.config.js
          pm2 save

          # Wait for services to start (Next.js needs more time)
          echo "==> Waiting for services to initialize..."
          sleep 10

          # Health checks with retries
          echo "==> Running health checks..."

          # Backend health check
          MAX_RETRIES=5
          RETRY_COUNT=0
          until curl -f http://localhost:8000/api/v1/health || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            echo "Backend health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in 2s..."
            sleep 2
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "ERROR: Backend health check failed after $MAX_RETRIES attempts"
            exit 1
          fi
          echo "✓ Backend health check passed"

          # Frontend health check with retries
          RETRY_COUNT=0
          until curl -f -s http://localhost:3002 >/dev/null || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            echo "Frontend health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in 3s..."
            sleep 3
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "ERROR: Frontend health check failed after $MAX_RETRIES attempts"
            echo "Checking PM2 logs..."
            pm2 logs auto-author-frontend --lines 50 --nostream
            exit 1
          fi
          echo "✓ Frontend health check passed"

          echo "==> Deployment successful!"
          echo "    Release: $RELEASE_ID"
          echo "    Backend: http://localhost:8000"
          echo "    Frontend: http://localhost:3002"

          # Cleanup old releases (keep last 5)
          cd "$DEPLOY_BASE/releases"
          ls -t | tail -n +6 | xargs -r rm -rf

          echo "==> Cleanup complete"
          ENDSSH

      - name: Health checks
        run: |
          # Wait for services to stabilize
          sleep 10

          # Backend health check
          echo "Checking backend health..."
          curl -f https://api.dev.autoauthor.app/api/v1/health || exit 1

          # Frontend health check
          echo "Checking frontend health..."
          curl -f https://dev.autoauthor.app || exit 1

          # CORS verification
          echo "Checking CORS headers..."
          curl -s -D - -o /dev/null -X OPTIONS https://api.dev.autoauthor.app/api/v1/books \
            -H "Origin: https://dev.autoauthor.app" \
            -H "Access-Control-Request-Method: POST" | grep -i "access-control-allow-origin" || exit 1

      - name: Smoke tests
        run: |
          # Test API docs endpoint
          curl -f https://api.dev.autoauthor.app/docs || exit 1

          echo "✅ All smoke tests passed"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/staging_key
          rm -f /tmp/deploy-package.tar.gz
