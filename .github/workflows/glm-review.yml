name: GLM Review
on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"

jobs:
  review:
    # Only review substantial changes (5+ files, or 20+ additions, or 20+ deletions)
    if: |
      github.event.pull_request.changed_files >= 5 ||
      github.event.pull_request.additions >= 20 ||
      github.event.pull_request.deletions >= 20
    # Pinned to an immutable SHA (main @ 2026-07-10, verified on hai-sh#75) so
    # upstream pushes can't silently change the code that receives ZHIPU_API_KEY
    uses: frankbria/glm-review/.github/workflows/review.yml@b877d15a0f8c0855d0d2ebdcce32ae09cec1bb2d
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets:
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
