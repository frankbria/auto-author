name: GLM Review
on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"

jobs:
  review:
    # Same-repo head guard (#270): fork PRs must never reach a run that binds
    # ZHIPU_API_KEY. The repo is public today (so GitHub already withholds secrets
    # from fork `pull_request` runs), but this fails closed even if that changes
    # (repo goes private with fork-secrets, or the trigger drifts to
    # `pull_request_target`) — the same pwn-request class #191 closed for the
    # staging E2E workflow. `head.repo.full_name` is null for a deleted fork, and
    # `null == github.repository` is false, so the guard fails closed there too.
    # Only then review substantial changes (5+ files, or 20+ additions/deletions).
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.changed_files >= 5 ||
       github.event.pull_request.additions >= 20 ||
       github.event.pull_request.deletions >= 20)
    # Pinned to an immutable SHA (main @ 2026-07-10, verified on hai-sh#75) so
    # upstream pushes can't silently change the code that receives ZHIPU_API_KEY
    uses: frankbria/glm-review/.github/workflows/review.yml@b877d15a0f8c0855d0d2ebdcce32ae09cec1bb2d
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets:
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
